name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Package ACOS
        run: node scripts/package-acos.mjs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body: |
            ## 🚀 Agentic Creator OS ${{ github.ref_name }}

            The operating system for golden age creators. Includes skill and agent packs for Antigravity, Codex, and Claude Code.

            ### Quick Start
            ```bash
            git clone https://github.com/frankxai/agentic-creator-os.git
            cd agentic-creator-os
            ./install.sh
            /acos
            ```

            See [CHANGELOG](CHANGELOG.md) for full release notes.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
