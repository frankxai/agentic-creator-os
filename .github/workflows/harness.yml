name: harness
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
jobs:
  inventory-truth:
    name: Inventory truth + frontmatter lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Inventory truth + frontmatter validity
        run: node test/inventory-truth.mjs
