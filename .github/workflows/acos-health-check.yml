name: ACOS Health Check

on:
  schedule:
    - cron: '17 6 * * 1'
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate plugin manifests
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json')); print('plugin.json OK')"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json')); print('marketplace.json OK')"
          python3 -c "import json; json.load(open('.claude/skill-rules.json')); print('skill-rules.json OK')"
          python3 -c "import json; json.load(open('hooks/hooks.json')); print('hooks.json OK')"

      - name: Leak gate — private content must never land in the public tree
        run: |
          set -e
          # Case-insensitive; catches personal machine paths in any casing or
          # separator style, session telemetry, and third-party attribution.
          # "Oracle" product references (OCI skills, citations) are legitimate;
          # employer-strategy language is caught by the non-compete pattern.
          PATTERNS='claude-mem-context|mnt[/\\-]c[/\\-]users[/\\-]frank|c:[/\\]+users[/\\]+frank|/c/users/frank|/home/frankx|ruv@ruv\.net|onedrive - oracle|non-compete'
          MATCHES=$(git grep -inE "$PATTERNS" -- ':!*.yml' ':!docs/archive/*' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Private/leaked content detected:"
            echo "$MATCHES"
            exit 1
          fi
          echo "Leak gate: clean"

      - name: Stats + phantom-reference gate
        run: node scripts/generate-stats.mjs --check

      - name: Count assets
        run: |
          SKILLS=$(find .claude/skills skills -name "SKILL.md" 2>/dev/null | wc -l)
          COMMANDS=$(find .claude/commands -name "*.md" 2>/dev/null | wc -l)
          AGENTS=$(find .claude/agents -maxdepth 1 -name "*.md" 2>/dev/null | wc -l)
          echo "Skills: $SKILLS | Commands: $COMMANDS | Agents: $AGENTS"
