name: Branch Cleanup

# Two triggers:
#   - workflow_dispatch — manual run from Actions tab (paste branch list)
#   - push: when .github/cleanup-queue.txt changes on main, auto-delete
#     every line in that file (one branch name per line, # for comments).
#
# To use the queue:
#   1. Edit .github/cleanup-queue.txt — add branch names (one per line).
#   2. Commit + merge to main.
#   3. Workflow fires, deletes the listed branches.
#   4. The queue file is automatically cleared by the workflow at the end,
#      so the next push doesn't re-run it.
#
# See BRANCH_AUDIT.md at repo root for the canonical SAFE_DELETE list.

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Space-separated branch names to delete'
        required: true
        type: string
      dry_run:
        description: 'Dry run (print without deleting)'
        required: false
        default: 'false'
        type: string
  push:
    branches: [main]
    paths:
      - '.github/cleanup-queue.txt'

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve branch list
        id: list
        env:
          MANUAL_INPUT: ${{ inputs.branches }}
          EVENT: ${{ github.event_name }}
        run: |
          set -e
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Source: workflow_dispatch input"
            BRANCHES="$MANUAL_INPUT"
          else
            echo "Source: .github/cleanup-queue.txt"
            if [ ! -f .github/cleanup-queue.txt ]; then
              echo "No queue file. Nothing to do."
              echo "branches=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Strip comments + blank lines, join with spaces.
            BRANCHES=$(grep -vE '^\s*(#|$)' .github/cleanup-queue.txt | tr '\n' ' ')
          fi
          echo "Resolved branches: $BRANCHES"
          echo "branches=$BRANCHES" >> "$GITHUB_OUTPUT"

      - name: Validate branch list against audit
        id: validate
        if: steps.list.outputs.branches != ''
        env:
          BRANCHES: ${{ steps.list.outputs.branches }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import sys

          requested = []
          seen = set()
          for branch in os.environ.get("BRANCHES", "").split():
              if branch not in seen:
                  requested.append(branch)
                  seen.add(branch)

          with open("BRANCH_AUDIT.md", encoding="utf-8") as audit:
              audit_text = audit.read()

          safe_delete = set()
          section_re = re.compile(r"^### `([^`]+)`(?P<body>.*?)(?=^### `|\n## |\Z)", re.MULTILINE | re.DOTALL)
          for match in section_re.finditer(audit_text):
              if "Recommendation:** `SAFE_DELETE`" in match.group("body"):
                  safe_delete.add(match.group(1))

          branch_name_re = re.compile(r"^[A-Za-z0-9._/-]+$")
          invalid = [
              branch for branch in requested
              if branch in {"main", "master"}
              or branch.startswith("-")
              or branch.startswith("refs/")
              or ".." in branch
              or not branch_name_re.fullmatch(branch)
          ]
          unsafe = [branch for branch in requested if branch not in safe_delete]

          if invalid:
              print("Refusing malformed or protected branch name(s):", ", ".join(invalid), file=sys.stderr)
          if unsafe:
              print("Refusing branch(es) not marked SAFE_DELETE in BRANCH_AUDIT.md:", ", ".join(unsafe), file=sys.stderr)
          if invalid or unsafe:
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"branches={' '.join(requested)}\n")
          PY

      - name: Delete branches
        if: steps.validate.outputs.branches != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCHES: ${{ steps.validate.outputs.branches }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          echo "Target repo: $REPO"
          echo "Branches:    $BRANCHES"
          ok=0
          fail=0
          for b in $BRANCHES; do
            printf "  %-55s " "$b"
            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY_RUN (would delete)"
              continue
            fi
            if gh api -X DELETE "repos/$REPO/git/refs/heads/$b" >/dev/null 2>&1; then
              echo "DELETED"
              ok=$((ok+1))
            else
              echo "FAILED (already gone or protected?)"
              fail=$((fail+1))
            fi
          done
          echo ""
          echo "Summary: $ok deleted · $fail failed"
          if [ "$fail" -gt 0 ]; then
            echo "One or more branch deletions failed; leaving cleanup queue intact."
            exit 1
          fi

      - name: Clear the queue file
        if: success() && github.event_name == 'push' && steps.validate.outputs.branches != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Reset queue to its header so the next push doesn't re-run.
          cat > .github/cleanup-queue.txt <<'EOF'
          # Branch cleanup queue.
          # Add branch names below (one per line) and commit to main.
          # The Branch Cleanup workflow will delete them and clear this file.
          # See BRANCH_AUDIT.md for the canonical safe-delete list.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/cleanup-queue.txt
          if git diff --cached --quiet; then
            echo "Queue already empty"
          else
            git commit -m "chore(ci): clear branch cleanup queue [skip ci]"
            git push
          fi
