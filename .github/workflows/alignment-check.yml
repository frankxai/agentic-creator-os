name: Agent Alignment Check

on:
  pull_request:
    paths:
      - '.claude/agents/**'
      - '.claude/skills/**'
      - '.claude/commands/**'

jobs:
  alignment-check:
    name: Validate Agent Alignment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate frontmatter of changed definition files
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          # -z output + read -d '' keeps filenames with unusual characters
          # from ever being interpreted by the shell.
          has_errors=false
          while IFS= read -r -d '' file; do
            case "$file" in
              .claude/agents/*.md|.claude/skills/*.md|.claude/commands/*.md) ;;
              *) continue ;;
            esac
            base=$(basename "$file")
            [ "$base" = "README.md" ] || [ "$base" = "CLAUDE.md" ] && continue
            [ -f "$file" ] || continue
            echo "Checking: $file"
            if ! head -1 "$file" | grep -q "^---$"; then
              echo "  ERROR: missing YAML frontmatter"
              has_errors=true
              continue
            fi
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$file" | sed '1d;$d')
            case "$file" in
              .claude/agents/*)
                echo "$frontmatter" | grep -q "^name:" || { echo "  ERROR: missing 'name'"; has_errors=true; }
                echo "$frontmatter" | grep -q "^description:" || { echo "  ERROR: missing 'description'"; has_errors=true; }
                ;;
            esac
          done < <(git diff --name-only -z "origin/${{ github.base_ref }}"...HEAD)
          if [ "$has_errors" = true ]; then
            echo "Some files have invalid frontmatter (agents need name + description)."
            exit 1
          fi
          echo "Frontmatter OK"

      - name: Check for banned language patterns (warn only)
        run: |
          set -uo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1 2>/dev/null || true
          banned='soul-aligned|consciousness evolution|overwhelmed to empowered|hustle harder|transformative journey|spiritual awakening|unlock your potential|game-changing|paradigm shift'
          while IFS= read -r -d '' file; do
            [ -f "$file" ] || continue
            if grep -qiE "$banned" "$file" 2>/dev/null; then
              echo "WARN: banned-language pattern in $file (see CREATOR.md voice rules)"
            fi
          done < <(git diff --name-only -z "origin/${{ github.base_ref }}"...HEAD)
          echo "Language check complete (warnings are non-blocking)"

      - name: Validate skill-rules references
        run: |
          node scripts/generate-stats.mjs --check
